<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通風換氣判斷助手</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans text-slate-800 min-h-screen">

  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    
    <!-- Header -->
    <div class="bg-blue-600 p-6 text-white text-center">
      <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
        <i data-lucide="wind" class="w-7 h-7"></i>
        通風換氣判斷助手
      </h1>
      <p class="text-blue-100 text-sm mt-2">雙模式版：支援氣象局數據校正</p>
    </div>

    <div class="p-6 space-y-8">
      
      <!-- Section 1: 室外環境 (雙模式) -->
      <section class="space-y-4">
        <div class="flex items-center justify-between bg-blue-50 p-3 rounded-lg border border-blue-100">
          <div class="flex items-center gap-2">
            <i data-lucide="map-pin" class="w-5 h-5 text-blue-600"></i>
            <h2 class="text-lg font-bold text-slate-700">室外環境</h2>
          </div>
          <div class="flex bg-slate-200 rounded-lg p-1">
            <button id="btn-auto-mode" class="px-3 py-1 text-sm rounded-md transition-all bg-white shadow text-blue-600 font-bold">
              自動 API
            </button>
            <button id="btn-manual-mode" class="px-3 py-1 text-sm rounded-md transition-all text-slate-500 hover:text-slate-700">
              手動輸入
            </button>
          </div>
        </div>

        <!-- 自動模式：顯示地區選擇 -->
        <div id="auto-mode-section" class="grid grid-cols-2 gap-3 transition-opacity duration-300">
          <div class="relative">
            <select id="city-select" class="w-full p-2 border border-slate-300 rounded-lg bg-slate-50 text-sm appearance-none outline-none focus:ring-2 focus:ring-blue-400"></select>
            <div class="absolute right-2 top-2.5 pointer-events-none text-slate-500 text-xs">▼</div>
          </div>
          
          <div class="relative">
            <select id="district-select" class="w-full p-2 border border-slate-300 rounded-lg bg-slate-50 text-sm appearance-none outline-none focus:ring-2 focus:ring-blue-400"></select>
            <div class="absolute right-2 top-2.5 pointer-events-none text-slate-500 text-xs">▼</div>
          </div>
          
          <div class="col-span-2 flex justify-end mt-[-8px]">
             <button id="refresh-btn" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors text-slate-500" title="更新天氣">
              <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
            </button>
          </div>
        </div>

        <!-- 手動模式：顯示輸入欄位 -->
        <div id="manual-mode-section" class="space-y-5 bg-blue-50 p-4 rounded-xl border border-blue-100 hidden transition-opacity duration-300">
          <div class="flex items-start gap-2 text-xs text-blue-600 mb-2">
            <i data-lucide="settings-2" class="w-3.5 h-3.5 mt-0.5"></i>
            <span>請參考 CWB 氣象局或實際溫度計數值輸入</span>
          </div>

          <!-- 室外溫度 Slider -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-slate-600 text-sm font-medium">室外溫度 (°C)</span>
              <input type="number" id="manual-outdoor-temp-input" step="0.1" class="w-20 p-1 text-right border border-blue-300 rounded text-slate-800 font-bold bg-white focus:ring-2 focus:ring-blue-400 outline-none"/>
            </div>
            <input type="range" id="manual-outdoor-temp-range" min="0" max="40" step="0.1" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
          </div>

          <!-- 室外濕度 Slider -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-slate-600 text-sm font-medium">室外濕度 (%)</span>
              <input type="number" id="manual-outdoor-humidity-input" step="1" class="w-20 p-1 text-right border border-blue-300 rounded text-slate-800 font-bold bg-white focus:ring-2 focus:ring-blue-400 outline-none"/>
            </div>
            <input type="range" id="manual-outdoor-humidity-range" min="20" max="100" step="1" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
          </div>
        </div>

        <!-- 錯誤訊息 -->
        <div id="error-message" class="hidden p-3 bg-red-50 text-red-600 text-sm rounded-lg items-center gap-2">
          <i data-lucide="alert-triangle" class="w-4 h-4"></i> <span id="error-text"></span>
        </div>

        <!-- 室外數據顯示卡片 -->
        <div id="outdoor-data-cards" class="grid grid-cols-3 gap-2 mt-2">
          <!-- 卡片由 JS 動態更新 -->
        </div>
      </section>

      <!-- Section 2: 室內環境 (手動輸入 + Slider) -->
      <section class="space-y-4">
        <h2 class="text-lg font-bold flex items-center gap-2 text-slate-700">
          <i data-lucide="thermometer" class="w-5 h-5 text-orange-500"></i>
          室內環境設定
        </h2>
        
        <div class="space-y-5 bg-orange-50 p-4 rounded-xl border border-orange-100">
          
          <!-- 室內溫度 -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-slate-600 text-sm font-medium">室內溫度 (°C)</span>
              <input type="number" id="indoor-temp-input" step="0.1" class="w-20 p-1 text-right border border-orange-300 rounded text-slate-800 font-bold bg-white focus:ring-2 focus:ring-orange-400 outline-none"/>
            </div>
            <input type="range" id="indoor-temp-range" min="10" max="40" step="0.1" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-orange-500"/>
          </div>

          <!-- 室內濕度 -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-slate-600 text-sm font-medium">室內濕度 (%)</span>
              <input type="number" id="indoor-humidity-input" step="1" class="w-20 p-1 text-right border border-orange-300 rounded text-slate-800 font-bold bg-white focus:ring-2 focus:ring-blue-400 outline-none"/>
            </div>
            <input type="range" id="indoor-humidity-range" min="30" max="99" step="1" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-blue-500"/>
          </div>

          <!-- 室內露點顯示 -->
          <div class="flex items-center justify-between pt-3 border-t border-orange-200">
            <span class="text-sm text-slate-600 font-medium">計算室內露點:</span>
            <span class="text-xl font-bold text-orange-700" id="indoor-dew-point-display">--°C</span>
          </div>
        </div>
        
        <!-- 強濕源 Checkbox -->
        <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
          <div id="moisture-checkbox-ui" class="w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors bg-green-500 border-green-500">
            <i data-lucide="check-circle-2" id="moisture-check-icon" class="w-4 h-4 text-white"></i>
          </div>
          <input type="checkbox" id="no-moisture-checkbox" checked class="hidden"/>
          <span class="text-sm font-medium text-slate-700">
            目前無強濕源
            <span class="block text-xs text-slate-400 font-normal">沒有在曬衣、煮飯、拖地</span>
          </span>
        </label>
      </section>

      <!-- Section 3: 分析結果 -->
      <section class="space-y-4">
        <h2 class="text-lg font-bold flex items-center gap-2 text-slate-700">
          <i data-lucide="check-circle-2" class="w-5 h-5 text-green-600"></i>
          分析結果
        </h2>

        <div id="loading-skeleton" class="h-32 bg-slate-100 rounded-xl animate-pulse hidden"></div>
        <div id="waiting-text" class="text-center text-slate-400 py-4 hidden">等待氣象資料...</div>

        <div id="analysis-results" class="space-y-3">
          <!-- 條件項目由 JS 動態更新 -->
        </div>
      </section>

      <!-- 最終建議 -->
      <div id="final-recommendation" class="p-4 rounded-xl text-center border-2 hidden">
        <h3 id="recommendation-title" class="text-2xl font-bold mb-1"></h3>
        <p id="recommendation-desc" class="text-sm"></p>
      </div>

    </div>
    
    <div class="bg-slate-50 p-4 text-center text-xs text-slate-400" id="data-source-footer">
      資料來源: Open-Meteo Weather API
    </div>
  </div>

    // --- 應用程式狀態 ---
    let state = {
      selectedCity: "臺南市",
      selectedDistrict: TAIWAN_LOCATIONS["臺南市"][0],
      apiOutdoorTemp: null,
      apiOutdoorHumidity: null,
      apiOutdoorDewPoint: null,
      manualOutdoorTemp: 24,
      manualOutdoorHumidity: 65,
      isOutdoorManual: false,
      loading: false,
      error: null,
      indoorTemp: 26,
      indoorHumidity: 70,
      noMoistureSource: true
    };

    // --- 工具函數 ---
    const calculateDewPoint = (T, RH) => {
      if (T === '' || RH === '' || T == null || RH == null || isNaN(T) || isNaN(RH)) return null;
      const a = 17.27;
      const b = 237.7;
      const alpha = ((a * T) / (b + T)) + Math.log(RH / 100.0);
      const dewPoint = (b * alpha) / (a - alpha);
      return parseFloat(dewPoint.toFixed(1));
    };

    const els = {
      btnAutoMode: document.getElementById('btn-auto-mode'),
      btnManualMode: document.getElementById('btn-manual-mode'),

      finalRecommendation: document.getElementById('final-recommendation'),
      recommendationTitle: document.getElementById('recommendation-title'),
      recommendationDesc: document.getElementById('recommendation-desc'),
      
      dataSourceFooter: document.getElementById('data-source-footer')
    };

    // --- 初始化下拉選單 ---
    function initSelects() {
      els.citySelect.innerHTML = Object.keys(TAIWAN_LOCATIONS).map(city => 
        `<option value="${city}">${city}</option>`
      ).join('');
      els.citySelect.value = state.selectedCity;
      updateDistrictSelect();
    }

    function updateDistrictSelect() {
      const districts = TAIWAN_LOCATIONS[state.selectedCity];
      els.districtSelect.innerHTML = districts.map(d => 
        `<option value="${d.name}">${d.name}</option>`
      ).join('');
      
      // 如果目前的區不在新城市裡，重置為第一個區
      if (!districts.find(d => d.name === state.selectedDistrict.name)) {
        state.selectedDistrict = districts[0];
      }
      els.districtSelect.value = state.selectedDistrict.name;
    }

    // --- 抓取 API 資料 ---
    async function fetchWeather() {
      state.loading = true;
      state.error = null;
      render();

      try {
        const { lat, lon } = state.selectedDistrict;
        const response = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m&timezone=Asia%2FTaipei`
        );
        const data = await response.json();
        
        if (data.current) {
          state.apiOutdoorTemp = data.current.temperature_2m;
          state.apiOutdoorHumidity = data.current.relative_humidity_2m;
          state.apiOutdoorDewPoint = calculateDewPoint(state.apiOutdoorTemp, state.apiOutdoorHumidity);
        } else {
          throw new Error("無法獲取氣象資料");
        }
      } catch (err) {
        state.error = "無法連線氣象服務";
      } finally {
        state.loading = false;
        render();
      }
    }

    // --- 渲染 UI (對應 React 狀態改變) ---
    function render() {
      // 1. 模式切換樣式
      if (state.isOutdoorManual) {
        els.btnManualMode.className = "px-3 py-1 text-sm rounded-md transition-all bg-white shadow text-blue-600 font-bold";
        els.btnAutoMode.className = "px-3 py-1 text-sm rounded-md transition-all text-slate-500 hover:text-slate-700";
        els.manualModeSection.classList.remove('hidden');
        els.autoModeSection.classList.add('hidden');
        els.dataSourceFooter.textContent = "目前使用：手動輸入數據";
      } else {
        els.btnAutoMode.className = "px-3 py-1 text-sm rounded-md transition-all bg-white shadow text-blue-600 font-bold";
        els.btnManualMode.className = "px-3 py-1 text-sm rounded-md transition-all text-slate-500 hover:text-slate-700";
        els.autoModeSection.classList.remove('hidden');
        els.manualModeSection.classList.add('hidden');
        els.dataSourceFooter.textContent = "資料來源: Open-Meteo Weather API";
      }

      // 2. 處理 Loading 動畫
      if (!state.isOutdoorManual && state.loading) {
        els.refreshIcon.classList.add('animate-spin');
      } else {
        els.refreshIcon.classList.remove('animate-spin');
      }

      // 3. 處理錯誤顯示
      if (!state.isOutdoorManual && state.error) {
        els.errorMessage.classList.remove('hidden');
        els.errorMessage.classList.add('flex');
        els.errorText.textContent = state.error;
      } else {
        els.errorMessage.classList.add('hidden');
        els.errorMessage.classList.remove('flex');
      }

      // 4. 同步 Input 值
      els.manualOutdoorTempInput.value = state.manualOutdoorTemp !== '' ? state.manualOutdoorTemp : '';
      els.manualOutdoorTempRange.value = state.manualOutdoorTemp !== '' ? state.manualOutdoorTemp : 24;
      els.manualOutdoorHumidityInput.value = state.manualOutdoorHumidity !== '' ? state.manualOutdoorHumidity : '';
      els.manualOutdoorHumidityRange.value = state.manualOutdoorHumidity !== '' ? state.manualOutdoorHumidity : 65;

      els.indoorTempInput.value = state.indoorTemp !== '' ? state.indoorTemp : '';
      els.indoorTempRange.value = state.indoorTemp !== '' ? state.indoorTemp : 26;
      els.indoorHumidityInput.value = state.indoorHumidity !== '' ? state.indoorHumidity : '';
      els.indoorHumidityRange.value = state.indoorHumidity !== '' ? state.indoorHumidity : 70;

      // 5. 處理濕源 Checkbox UI
      if (state.noMoistureSource) {
        els.moistureCheckboxUi.className = "w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors bg-green-500 border-green-500";
        els.moistureCheckIcon.classList.remove('hidden');
      } else {
        els.moistureCheckboxUi.className = "w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors border-slate-300";
        els.moistureCheckIcon.classList.add('hidden');
      }

      // 6. 運算邏輯
      const indoorDewPoint = calculateDewPoint(state.indoorTemp, state.indoorHumidity);
      els.indoorDewPointDisplay.textContent = indoorDewPoint !== null ? `${indoorDewPoint}°C` : "--°C";

      const finalOutdoorTemp = state.isOutdoorManual ? state.manualOutdoorTemp : state.apiOutdoorTemp;
      const finalOutdoorHumidity = state.isOutdoorManual ? state.manualOutdoorHumidity : state.apiOutdoorHumidity;
      const finalOutdoorDewPoint = state.isOutdoorManual 
        ? calculateDewPoint(state.manualOutdoorTemp, state.manualOutdoorHumidity) 
        : state.apiOutdoorDewPoint;

      // 室外數據卡片
      if (!state.isOutdoorManual || (state.isOutdoorManual && state.manualOutdoorTemp !== '')) {
        els.outdoorDataCards.innerHTML = `
          ${createDataCard("室外溫", finalOutdoorTemp, "°C", "thermometer", false, !state.isOutdoorManual && state.loading, state.isOutdoorManual)}
          ${createDataCard("室外濕", finalOutdoorHumidity, "%", "droplets", false, !state.isOutdoorManual && state.loading, state.isOutdoorManual)}
          ${createDataCard("室外露點", finalOutdoorDewPoint, "°C", null, true, !state.isOutdoorManual && state.loading, false)}
        `;
        lucide.createIcons(); // 重新渲染剛加入的 icon
      } else {
        els.outdoorDataCards.innerHTML = '';
      }

      // 判斷邏輯
      const dewPointDiff = finalOutdoorDewPoint !== null && indoorDewPoint !== null ? (indoorDewPoint - finalOutdoorDewPoint).toFixed(1) : null;
      const isDewPointSafe = dewPointDiff !== null && parseFloat(dewPointDiff) > 2.0;

      const tempDiff = finalOutdoorTemp !== null && state.indoorTemp !== null && state.indoorTemp !== '' ? (finalOutdoorTemp - state.indoorTemp).toFixed(1) : null;
      const isTempSafe = tempDiff !== null && parseFloat(tempDiff) <= 3.0;
      const isOutdoorCooler = tempDiff !== null && parseFloat(tempDiff) < 0;

      const canOpenWindow = isDewPointSafe && isTempSafe && state.noMoistureSource;

      // 7. 渲染分析結果區塊
      els.loadingSkeleton.classList.add('hidden');
      els.waitingText.classList.add('hidden');
      els.analysisResults.innerHTML = '';
      els.finalRecommendation.classList.add('hidden');

      if (state.loading && !state.isOutdoorManual) {
        els.loadingSkeleton.classList.remove('hidden');
      } else if (finalOutdoorDewPoint === null) {
        els.waitingText.classList.remove('hidden');
        els.waitingText.textContent = state.isOutdoorManual ? "請輸入完整室外數據" : "等待氣象資料...";
      } else {
        // 渲染條件項目
        els.analysisResults.innerHTML = `
          ${createConditionItem(
            isDewPointSafe, 
            "露點條件", 
            `室內露點(${indoorDewPoint ?? '--'}) - 室外露點(${finalOutdoorDewPoint}) = ${dewPointDiff}°C`, 
            "需 > 2°C", 
            "正值越大表示室外越乾燥，適合排濕。", 
            false
          )}
          ${createConditionItem(
            isTempSafe, 
            "溫度條件", 
            `室外溫度(${finalOutdoorTemp}) - 室內溫度(${state.indoorTemp !== '' ? state.indoorTemp : '--'}) = ${tempDiff}°C`, 
            "需 ≤ 3°C", 
            isOutdoorCooler ? "室外較涼，有助於通風降溫！" : "室外較熱，但仍在可接受範圍。", 
            isTempSafe && !isOutdoorCooler
          )}
          ${createConditionItem(
            state.noMoistureSource, 
            "環境條件", 
            state.noMoistureSource ? "無強濕源" : "有強濕源", 
            "需無濕源", 
            "若正在產生大量水氣，開窗效果有限。", 
            false
          )}
        `;

        // 渲染最終建議
        els.finalRecommendation.classList.remove('hidden');
        els.finalRecommendation.className = `p-4 rounded-xl text-center border-2 ${canOpenWindow ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`;
        
        els.recommendationTitle.className = `text-2xl font-bold mb-1 ${canOpenWindow ? 'text-green-700' : 'text-red-600'}`;
        els.recommendationTitle.textContent = canOpenWindow ? "✅ 建議開窗通風" : "❌ 不建議開窗";
        
        els.recommendationDesc.className = `text-sm ${canOpenWindow ? 'text-green-600' : 'text-red-500'}`;
        
        if (canOpenWindow) {
          els.recommendationDesc.textContent = "目前戶外乾燥且溫度適宜，適合開窗排濕！";
        } else if (!isDewPointSafe) {
          els.recommendationDesc.textContent = "戶外濕氣太重，開窗可能導致反潮。";
        } else if (!isTempSafe) {
          els.recommendationDesc.textContent = "戶外太熱，開窗會增加室內熱負荷。";
        } else {
          els.recommendationDesc.textContent = "請先排除室內濕源後再考慮開窗。";
        }

        lucide.createIcons();
      }
    }

    // --- 輔助產出 HTML 字串的函數 ---
    function createDataCard(label, value, unit, iconName, highlight, loading, isManual) {
      const manualBadge = isManual && !highlight ? `<div class="absolute top-0 right-0 w-2 h-2 bg-blue-500 rounded-full m-1" title="手動輸入中"></div>` : '';
      const iconHtml = iconName ? `<i data-lucide="${iconName}" class="w-4 h-4"></i>` : '';
      const bgClass = highlight ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-100';
      const textClass = highlight ? 'text-blue-700' : 'text-slate-800';

      let content = '';
      if (loading) {
        content = `<div class="h-6 w-12 bg-slate-200 rounded animate-pulse mx-auto"></div>`;
      } else {
        content = `<div class="font-bold ${textClass}">${value !== null && value !== '' ? value : '--'} <span class="text-xs font-normal text-slate-500">${unit}</span></div>`;
      }

      return `
        <div class="p-3 rounded-lg text-center border relative overflow-hidden ${bgClass}">
          ${manualBadge}
          <div class="text-xs text-slate-500 flex justify-center items-center gap-1 mb-1">
            ${iconHtml} ${label}
          </div>
          ${content}
        </div>
      `;
    }

    function createConditionItem(passed, title, math, standard, desc, isWarning) {
      const iconHtml = passed 
        ? (isWarning ? `<i data-lucide="alert-triangle" class="text-yellow-500 w-5 h-5"></i>` : `<i data-lucide="check-circle-2" class="text-green-500 w-5 h-5"></i>`)
        : `<i data-lucide="x-circle" class="text-red-500 w-5 h-5"></i>`;
      
      const badgeClass = passed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
      const badgeText = passed ? "符合" : "未符合";

      return `
        <div class="flex items-start gap-3 p-3 bg-white border border-slate-100 rounded-lg shadow-sm">
          <div class="mt-1">${iconHtml}</div>
          <div class="flex-1">
            <div class="flex justify-between items-center mb-1">
              <h4 class="font-bold text-slate-700 text-sm">${title}</h4>
              <span class="text-xs px-2 py-0.5 rounded-full ${badgeClass}">${badgeText}</span>
            </div>
            <div class="font-mono text-xs bg-slate-50 p-2 rounded text-slate-600 mb-1">
              ${math} <span class="text-slate-400">(${standard})</span>
            </div>
            <p class="text-xs text-slate-500">${desc}</p>
          </div>
        </div>
      `;
    }

    // --- 事件綁定 ---
    els.btnAutoMode.addEventListener('click', () => {
      state.isOutdoorManual = false;
      fetchWeather(); // 切換回來順便更新一下
    });
    
    els.btnManualMode.addEventListener('click', () => {
      state.isOutdoorManual = true;
      render();
    });

    els.citySelect.addEventListener('change', (e) => {
      state.selectedCity = e.target.value;
      updateDistrictSelect();
      if (!state.isOutdoorManual) fetchWeather();
    });

    els.districtSelect.addEventListener('change', (e) => {
      const districts = TAIWAN_LOCATIONS[state.selectedCity];
      state.selectedDistrict = districts.find(d => d.name === e.target.value);
      if (!state.isOutdoorManual) fetchWeather();
    });

    els.refreshBtn.addEventListener('click', () => {
      if (!state.isOutdoorManual) fetchWeather();
    });

    // 通用輸入處理器綁定
    const bindInput = (inputId, rangeId, stateKey) => {
      const input = document.getElementById(inputId);
      const range = document.getElementById(rangeId);
      
      const updateState = (val) => {
        state[stateKey] = val === '' ? '' : parseFloat(val);
        render();
      };

      input.addEventListener('input', (e) => updateState(e.target.value));
      range.addEventListener('input', (e) => updateState(e.target.value));
    };

    bindInput('manual-outdoor-temp-input', 'manual-outdoor-temp-range', 'manualOutdoorTemp');
    bindInput('manual-outdoor-humidity-input', 'manual-outdoor-humidity-range', 'manualOutdoorHumidity');
    bindInput('indoor-temp-input', 'indoor-temp-range', 'indoorTemp');
    bindInput('indoor-humidity-input', 'indoor-humidity-range', 'indoorHumidity');

    els.noMoistureCheckbox.addEventListener('change', (e) => {
      state.noMoistureSource = e.target.checked;
      render();
    });

    // --- 初始化執行 ---
    lucide.createIcons();
    initSelects();
    fetchWeather(); // 初次載入自動抓取天氣
  </script>
</body>
</html>
